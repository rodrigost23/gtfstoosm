name: Run Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "gtfstoosm/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - "noxfile.py"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
    paths:
      - "gtfstoosm/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements*.txt"
      - "noxfile.py"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python versions
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14

      - name: Install nox
        run: |
          python -m pip install --upgrade pip
          pip install nox

      - name: Run tests with nox
        run: nox
